name: Deploy to GitHub Pages
# Build and deploy the Astro site to GitHub Pages
# so we have a static copy not dependent on a cca.edu domain.

on:
  push:
    branches: [main]
    paths:
      - 'astro.config.mjs'
      - 'src/**'
      - 'public/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          BASE_PATH: ${{ github.event.repository.name }}
          # will not build without this due to robots.txt.ts
          PUBLIC_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
